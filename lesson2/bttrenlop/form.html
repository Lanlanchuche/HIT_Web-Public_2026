<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <h1 style="text-align: center;color: orange; font-size: 30px;">Login</h1>
    <form>
        <label >Email</label>
        <br>
        <input type="email" name="email" style="border-radius: 5px; width: 30%;">
        <br>
        <label >Password</label>
        <br>
        <input type="password" name="password" style="border-radius: 5px; width: 30%;">
        <br>
        <button type="submit" style="background-color: lightblue;">Login</button>
    </form>
</body>
</html>
